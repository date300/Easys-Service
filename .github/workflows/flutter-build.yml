name: Flutter Build & Deploy (APK + Web)

on:
  push:
    branches:
      - main  # আপনার মেইন ব্রাঞ্চের নাম মেইন (main) না হয়ে মাস্টার (master) হলে সেটা এখানে লিখুন

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. রিপোজিটরি চেকআউট
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. ফ্লাটার সেটআপ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      # ৩. ডিপেন্ডেন্সি ইন্সটল
      - name: Install dependencies
        run: flutter pub get

      # ৪. APK বিল্ড (রিলিজ মোড)
      - name: Build APK
        run: flutter build apk --release --no-shrink

      # ৫. APK আপলোড (যাতে আপনি GitHub Actions ট্যাব থেকে ডাউনলোড করতে পারেন)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # ৬. Web বিল্ড (আপনার রিপোজিটোরি নেম অনুযায়ী base-href সেট করা হয়েছে)
      - name: Build Web
        run: flutter build web --release --base-href "/Easys-Service/"

      # ৭. GitHub Pages-এ ডিপ্লয় করা
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
