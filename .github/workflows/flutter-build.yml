name: Flutter Build & Deploy

on:
  push:
    branches: ["main"]

# GitHub Pages-এ ডিপ্লয় করার জন্য প্রয়োজনীয় পারমিশন
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4 # এটি পেজেসের জন্য এনভায়রনমেন্ট ঠিক করে দেয়

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0' # আপনার প্রয়োজনীয় ভার্সন
          channel: 'stable'
      
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build Flutter Web
        # আপনার রিপোজিটরির নাম যদি Easys-Service হয়, তবে base-href ঠিক আছে
        run: flutter build web --release --base-href "/Easys-Service/"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web # এই ফোল্ডারের কন্টেন্ট গিটহাব পেজেসে যাবে

  deploy:
    needs: build # এই লাইনের জন্যই ওয়েবসাইট আগে বিল্ড হবে, তারপর ডিপ্লয় হবে
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
